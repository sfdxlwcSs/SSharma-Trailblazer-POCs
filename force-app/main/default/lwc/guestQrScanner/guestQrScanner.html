<template>
    <lightning-card title="Guest Check-In/Out Scanner">
        <div class="slds-p-around_medium">
            
            <!-- Status Display with Icon -->
            <div class="slds-m-bottom_medium">
                <lightning-layout vertical-align="center">
                    <lightning-layout-item size="12">
                        <div class="slds-text-align_center">
                            <template if:true={isSuccess}>
                                <lightning-icon 
                                    icon-name="utility:success" 
                                    alternative-text="Success"
                                    size="large"
                                    variant="success">
                                </lightning-icon>
                            </template>
                            <template if:true={isError}>
                                <lightning-icon 
                                    icon-name="utility:error" 
                                    alternative-text="Error"
                                    size="large"
                                    variant="error">
                                </lightning-icon>
                            </template>
                            <template if:true={isScanning}>
                                <lightning-icon 
                                    icon-name="utility:video" 
                                    alternative-text="Scanning"
                                    size="large"
                                    variant="warning">
                                </lightning-icon>
                            </template>
                        </div>
                    </lightning-layout-item>
                </lightning-layout>
            </div>

            <!-- Status Message -->
            <div class="slds-m-bottom_medium">
                <div class={statusClass}>
                    <p class="slds-text-heading_medium slds-text-align_center">
                        {status}
                    </p>
                </div>
            </div>

            <!-- Scanned Value (if available) -->
            <template if:true={scannedValue}>
                <div class="slds-m-bottom_medium">
                    <div class="slds-box slds-box_small slds-theme_shade">
                        <p class="slds-text-body_small slds-text-color_weak">
                            Badge Number:
                        </p>
                        <p class="slds-text-body_regular slds-truncate">
                            {scannedValue}
                        </p>
                    </div>
                </div>
            </template>

            <!-- Instructions -->
            <div class="slds-m-bottom_medium">
                <div class="slds-box slds-theme_info">
                    <lightning-icon 
                        icon-name="utility:info" 
                        alternative-text="Info"
                        size="x-small"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    <span class="slds-text-body_small">
                        <strong>Instructions:</strong>
                        <ul class="slds-list_dotted slds-m-top_x-small">
                            <li>Scan QR code to check in</li>
                            <li>Scan again after 30 minutes to check out</li>
                            <li>Camera will restart automatically after each scan</li>
                        </ul>
                    </span>
                </div>
            </div>

            <!-- Video Stream -->
            <div class="slds-m-bottom_medium">
                <video
                    autoplay
                    muted
                    playsinline
                    style="width:100%; max-width:600px; margin:0 auto; display:block; border:2px solid #0070d2; border-radius:4px;">
                </video>
            </div>

        </div>
    </lightning-card>
</template>
