<template>
    <lightning-file-upload 
        label="Attach Files here:" 
        name="UploadFile" 
        record-id={recordId}
        onuploadfinished={handleUploadFinished} 
         file-field-name="Guest_Record_fileupload__c"
        multiple 
        file-field-value={recordId}>
    </lightning-file-upload>
    <template for:each={uploadedFileNames} for:item="file">
        <div key={file}>{file}</div>
    </template>
</template>
